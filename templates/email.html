<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body {
    margin: 0;
    padding: 0;
    background: #f1f5f9;
    font-family: Arial, Helvetica, sans-serif;
}

.container {
    width: 100%;
    max-width: 720px;
    margin: auto;
    background: #ffffff;
}

.header {
    background: linear-gradient(135deg,#0f172a,#2563eb);
    color: white;
    text-align: center;
    padding: 45px 25px;
}

.header h1 {
    margin: 0;
    font-size: 36px;
}

.date {
    margin-top: 12px;
    font-size: 17px;
    opacity: 0.9;
}

.section {
    padding: 30px 25px;
}

.section-title {
    font-size: 26px;
    color: #1d4ed8;
    margin-bottom: 22px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 10px;
}

.card {
    background: #ffffff;
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 25px;
    border: 1px solid #e5e7eb;
}

.card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 18px;
}

.card h3 {
    color: #111827;
    font-size: 21px;
    line-height: 1.4;
}

.summary {
    color: #374151;
    font-size: 16px;
    line-height: 1.8;
}

.why {
    background: #eff6ff;
    border-left: 4px solid #2563eb;
    padding: 15px;
    margin-top: 18px;
    color:#1e3a8a;
    line-height:1.6;
}

.button {
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:12px 24px;
    border-radius:10px;
    text-decoration:none;
    margin-top:15px;
}

.footer {
    background:#0f172a;
    color:white;
    padding:30px 20px;
    text-align:center;
    font-size:14px;
}

@media(max-width:600px){

.section{
    padding:20px 15px;
}

.header h1{
    font-size:28px;
}

.card{
    padding:16px;
}

}

</style>

</head>

<body>

<div class="container">

{{HEADER}}

{{AI_NEWS}}

{{INDIA_NEWS}}

{{FOOTER}}

</div>

</body>
</html>
