<!-- Email Template -->
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

body{
    margin:0;
    padding:0;
    background:#edf2f7;
    font-family:Arial,sans-serif;
}

.container{
    width:100%;
    max-width:700px;
    margin:auto;
    background:white;
}

.header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    text-align:center;
    padding:40px;
}

.header h1{
    margin:0;
    font-size:34px;
}

.date{
    margin-top:10px;
    font-size:18px;
}

.section{
    padding:30px;
}

.section-title{

font-size:28px;

margin-bottom:20px;

color:#2563eb;

}

.card{

border:1px solid #ddd;

border-radius:12px;

padding:20px;

margin-bottom:25px;

background:white;

}

.card img{

width:100%;

border-radius:10px;

margin-bottom:15px;

}

.card h3{

margin-top:0;

}

.summary{

font-size:16px;

line-height:1.7;

color:#444;

}

.button{

display:inline-block;

background:#2563eb;

color:white;

padding:12px 22px;

border-radius:8px;

text-decoration:none;

margin-top:12px;

}

.footer{

background:#111827;

color:white;

padding:25px;

text-align:center;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

{{HEADER}}

{{AI_NEWS}}

{{INDIA_NEWS}}

{{FOOTER}}

</div>

</body>

</html>
